name: Docker Login

on:
  push:
    branches:
      - main

jobs:
  docker-login:
    name: Docker Login
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/solar-system:${{ github.sha }}

      - name: List Docker images
        run: docker images

      - name: Docker image test
        run: |
          docker image
          docker run --name solar-system-app -d \
           -p 3000:3000 \
           -e MONGO_URI=${{ secrets.MONGO_URI }} \
           -e MONGO_USERNAME=${{ secrets.MONGO_USERNAME }} \
           -e MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }} \
           ${{ secrets.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
          export IP_ADDRESS=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
          echo "IP Address: $IP_ADDRESS"
          echo "Test URL: http://127.0.0.1:3000"
          wget -qO- http://127.0.0.1:3000 | grep "Solar System"

      - name: push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/solar-system:${{ github.sha }}

